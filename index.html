<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>接住掉落物 — 简单小游戏</title>
  <style>
    body { margin:0; font-family: sans-serif; display:flex; height:100vh; align-items:center; justify-content:center; background:#222; color:#fff; }
    canvas { background:#0b1220; display:block; border:4px solid #333; }
    #ui { position:absolute; top:12px; left:12px; }
    .hint { font-size:14px; color:#ccc; }
  </style>
</head>
<body>
  <div id="ui">
    <div id="score">分数: 0</div>
    <div id="lives">生命: 3</div>
    <div class="hint">← → 或 A D 控制移动，空格暂停/继续，R 重玩</div>
  </div>
  <canvas id="game" width="480" height="640"></canvas>

  <script>
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  // 可调常量：所有方块的统一下落速度（像素/帧）
  const ITEM_SPEED = 1.8;

  // 游戏状态
  let score = 0, lives = 3, paused = false, gameOver = false;

  // 玩家
  const player = { x: W/2, y: H - 40, w: 80, h: 16, speed: 6 };

  // 掉落物（现在同一时刻最多一个）
  const items = [];
  let spawnTimer = 0, spawnInterval = 60; // 帧为单位

  // 输入
  const keys = {};
  window.addEventListener('keydown', e => {
    keys[e.key.toLowerCase()] = true;
    if (e.key === ' '){ paused = !paused; }
    if (e.key.toLowerCase() === 'r' && gameOver) resetGame();
  });
  window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

  function spawnItem(){
    // 仅当没有正在下落的方块时才生成新的方块（保证同一时刻只有一个）
    if (items.length > 0) return;

    const size = 18 + Math.random()*14;
    items.push({
      x: Math.random() * (W - size),
      y: -size,
      w: size, h: size,
      // 统一速度（所有方块相同）
      vy: ITEM_SPEED
    });
  }

  function update(){
    if (paused || gameOver) return;

    // 玩家移动
    if (keys['arrowleft'] || keys['a']) player.x -= player.speed;
    if (keys['arrowright'] || keys['d']) player.x += player.speed;
    player.x = Math.max(0, Math.min(W - player.w, player.x));

    // 生成掉落物（spawnInterval 控制生成频率）
    spawnTimer++;
    if (spawnTimer >= spawnInterval){
      spawnTimer = 0;
      spawnItem();
      // 难度随分数略增（保留原逻辑）
      if (spawnInterval > 20 && score % 5 === 0) spawnInterval = Math.max(20, spawnInterval - 2);
    }

    // 更新掉落物
    for (let i = items.length - 1; i >= 0; i--){
      const it = items[i];
      it.y += it.vy;
      // 碰撞检测（轴对齐包围盒）
      if (it.y + it.h >= player.y && it.x < player.x + player.w && it.x + it.w > player.x){
        score += 1;
        items.splice(i,1);
        document.getElementById('score').textContent = '分数: ' + score;
        continue;
      }
      // 掉落到底部
      if (it.y > H){
        items.splice(i,1);
        lives -= 1;
        document.getElementById('lives').textContent = '生命: ' + lives;
        if (lives <= 0){ gameOver = true; }
      }
    }
  }

  function draw(){
    // 背景
    ctx.clearRect(0,0,W,H);
    // 地面线
    ctx.fillStyle = '#071022';
    ctx.fillRect(0, player.y + player.h, W, H - player.y - player.h);
    // 玩家
    ctx.fillStyle = '#4ee';
    ctx.fillRect(player.x, player.y, player.w, player.h);
    // 掉落物
    for (const it of items){
      ctx.fillStyle = '#f5c542';
      ctx.fillRect(it.x, it.y, it.w, it.h);
    }
    // HUD
    if (paused){
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(W/2 - 120, H/2 - 36, 240, 72);
      ctx.fillStyle = '#fff';
      ctx.font = '20px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('已暂停 — 空格继续', W/2, H/2+6);
    }
    if (gameOver){
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(0, H/2 - 80, W, 160);
      ctx.fillStyle = '#ff7b7b';
      ctx.font = '32px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('游戏结束', W/2, H/2 - 10);
      ctx.fillStyle = '#fff';
      ctx.font = '18px sans-serif';
      ctx.fillText('分数: ' + score + '    按 R 重玩', W/2, H/2 + 24);
    }
  }

  function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
  }

  function resetGame(){
    score = 0; lives = 3; paused = false; gameOver = false;
    items.length = 0; spawnTimer = 0; spawnInterval = 60;
    player.x = W/2;
    document.getElementById('score').textContent = '分数: ' + score;
    document.getElementById('lives').textContent = '生命: ' + lives;
  }

  // 启动
  loop();
  </script>
</body>
</html>
