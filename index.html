<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>接住掉落物 — 简单小游戏</title>
  <style>
    body { margin:0; font-family: sans-serif; display:flex; height:100vh; align-items:center; justify-content:center; background:#222; color:#fff; }
    canvas { background:#0b1220; display:block; border:4px solid #333; width:100%; max-width:480px; height:auto; touch-action:none; }
    #ui { position:absolute; top:12px; left:12px; }
    .hint { font-size:14px; color:#ccc; }
  </style>
</head>
<body>
  <div id="ui">
    <div id="score">分数: 0</div>
    <div id="lives">生命: 3</div>
    <div class="hint">← → 或 A D 控制移动；触摸屏幕左/右半边可移动；空格暂停/继续，R 重玩</div>
  </div>
  <canvas id="game" width="480" height="640"></canvas>

  <script>
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  // 时间驱动常量（以像素/秒为单位）
  // 原先 ITEM_SPEED 大约为 1.8 px/frame @60fps -> 1.8*60 px/sec
  // 下落速度改为原来的 2 倍
  const ITEM_SPEED_PPS = 1.8 * 60 * 2;    // 方块下落速度（px/sec）
  const PLAYER_SPEED_PPS = 6 * 60;    // 玩家移动速度（原来 6 px/frame -> px/sec）

  // 生成间隔（秒）: 原来为 60 帧 ~= 1 秒
  let spawnIntervalSec = 60 / 60; // 1.0s
  let spawnTimerSec = 0;

  // 游戏状态
  let score = 0, lives = 3, paused = false, gameOver = false;

  // 玩家
  const player = { x: W/2, y: H - 40, w: 80, h: 16, speedPPS: PLAYER_SPEED_PPS };

  // 掉落物（现在同一时刻最多一个）
  const items = [];

  // 输入
  const keys = {};
  window.addEventListener('keydown', e => {
    keys[e.key.toLowerCase()] = true;
    if (e.key === ' '){ paused = !paused; }
    if (e.key.toLowerCase() === 'r' && gameOver) resetGame();
  });
  window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

  // --- 触摸 / 指针 支持（适配手机） ---
  function getCanvasRelativeX(clientX){
    const rect = canvas.getBoundingClientRect();
    return clientX - rect.left;
  }

  function handleTouchStart(e){
    e.preventDefault();
    const clientX = e.touches ? e.touches[0].clientX : (e.clientX || (e.touches && e.touches[0] && e.touches[0].clientX));
    if (clientX == null) return;
    const x = getCanvasRelativeX(clientX);
    const rect = canvas.getBoundingClientRect();
    if (x < rect.width/2){ keys['arrowleft'] = true; keys['arrowright'] = false; }
    else { keys['arrowright'] = true; keys['arrowleft'] = false; }
  }
  function handleTouchMove(e){
    e.preventDefault();
    const clientX = e.touches ? e.touches[0].clientX : (e.clientX || (e.touches && e.touches[0] && e.touches[0].clientX));
    if (clientX == null) return;
    const x = getCanvasRelativeX(clientX);
    const rect = canvas.getBoundingClientRect();
    if (x < rect.width/2){ keys['arrowleft'] = true; keys['arrowright'] = false; }
    else { keys['arrowright'] = true; keys['arrowleft'] = false; }
  }
  function handleTouchEnd(e){
    e.preventDefault();
    keys['arrowleft'] = false; keys['arrowright'] = false;
  }

  canvas.addEventListener('touchstart', handleTouchStart, {passive:false});
  canvas.addEventListener('touchmove', handleTouchMove, {passive:false});
  canvas.addEventListener('touchend', handleTouchEnd, {passive:false});
  canvas.addEventListener('touchcancel', handleTouchEnd, {passive:false});
  canvas.addEventListener('pointerdown', (e)=>{ handleTouchStart(e); });
  canvas.addEventListener('pointermove', (e)=>{ if (e.buttons) handleTouchMove(e); });
  canvas.addEventListener('pointerup', handleTouchEnd);

  // --- 生成项 ---
  function spawnItem(){
    if (items.length > 0) return; // 保证同一时刻只有一个下落物
    const size = 18 + Math.random()*14;
    items.push({
      x: Math.random() * (W - size),
      y: -size,
      w: size, h: size,
      vy: ITEM_SPEED_PPS // px/sec
    });
  }

  // 更新时间驱动的 update（dt 单位：秒）
  function update(dt){
    if (paused || gameOver) return;

    // 玩家移动（基于时间）
    if (keys['arrowleft'] || keys['a']) player.x -= player.speedPPS * dt;
    if (keys['arrowright'] || keys['d']) player.x += player.speedPPS * dt;
    player.x = Math.max(0, Math.min(W - player.w, player.x));

    // 生成掉落物（以秒计）
    spawnTimerSec += dt;
    if (spawnTimerSec >= spawnIntervalSec){
      spawnTimerSec = 0;
      spawnItem();
      // 难度随分数略增（将原帧数逻辑转换为秒）
      if (spawnIntervalSec > 20/60 && score % 5 === 0) spawnIntervalSec = Math.max(20/60, spawnIntervalSec - 2/60);
    }

    // 更新掉落物（vy 以 px/sec，乘以 dt 得到本帧位移）
    for (let i = items.length - 1; i >= 0; i--){
      const it = items[i];
      it.y += it.vy * dt;
      // 碰撞检测
      if (it.y + it.h >= player.y && it.x < player.x + player.w && it.x + it.w > player.x){
        score += 1;
        items.splice(i,1);
        document.getElementById('score').textContent = '分数: ' + score;
        continue;
      }
      // 掉落到底部
      if (it.y > H){
        items.splice(i,1);
        lives -= 1;
        document.getElementById('lives').textContent = '生命: ' + lives;
        if (lives <= 0){ gameOver = true; }
      }
    }
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    // 地面线
    ctx.fillStyle = '#071022';
    ctx.fillRect(0, player.y + player.h, W, H - player.y - player.h);
    // 玩家
    ctx.fillStyle = '#4ee';
    ctx.fillRect(player.x, player.y, player.w, player.h);
    // 掉落物
    for (const it of items){
      ctx.fillStyle = '#f5c542';
      ctx.fillRect(it.x, it.y, it.w, it.h);
    }
    // HUD
    if (paused){
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(W/2 - 120, H/2 - 36, 240, 72);
      ctx.fillStyle = '#fff';
      ctx.font = '20px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('已暂停 — 空格继续', W/2, H/2+6);
    }
    if (gameOver){
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(0, H/2 - 80, W, 160);
      ctx.fillStyle = '#ff7b7b';
      ctx.font = '32px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('游戏结束', W/2, H/2 - 10);
      ctx.fillStyle = '#fff';
      ctx.font = '18px sans-serif';
      ctx.fillText('分数: ' + score + '    按 R 重玩', W/2, H/2 + 24);
    }
  }

  // 主循环：用时间戳计算 delta time，保持在不同设备上一致
  let lastTimestamp = performance.now();
  function loop(timestamp){
    const dt = Math.min((timestamp - lastTimestamp) / 1000, 0.05); // 秒，最大 50ms 避免跳跃
    lastTimestamp = timestamp;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  function resetGame(){
    score = 0; lives = 3; paused = false; gameOver = false;
    items.length = 0; spawnTimerSec = 0; spawnIntervalSec = 60/60;
    player.x = W/2;
    document.getElementById('score').textContent = '分数: ' + score;
    document.getElementById('lives').textContent = '生命: ' + lives;
  }

  // 启动
  lastTimestamp = performance.now();
  requestAnimationFrame(loop);
  </script>
</body>
</html>
